name: Unit Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'composer.json'
      - '.github/workflows/unit-tests.yml'
  pull_request:
    branches: [ main, develop ]

jobs:
  tests:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: boutique_test
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
        ports:
          - 3306:3306
    
    strategy:
      matrix:
        php-version: ['8.0', '8.1', '8.2']
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_mysql
          tools: phpunit
      
      - name: Install Dependencies
        run: |
          composer install --no-progress --prefer-dist
      
      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysql -h 127.0.0.1 -uroot -proot -e "SELECT 1" 2>/dev/null; then
              echo "✓ MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 1
          done
          echo "✗ MySQL failed to start"
          exit 1
      
      - name: Setup Test Database
        run: |
          mysql -h 127.0.0.1 -uroot -proot < database/store.sql || echo "Schema already exists"
      
      - name: Run Tests
        run: |
          if [ -f phpunit.xml ]; then
            php vendor/bin/phpunit --configuration phpunit.xml
          else
            echo "No phpunit.xml found - skipping unit tests"
            exit 0
          fi
          
      - name: Upload Coverage Reports
        if: matrix.php-version == '8.1'
        uses: actions/upload-artifact@v3
        with:
          name: coverage-reports
          path: coverage/
